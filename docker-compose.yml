services:
  db:
    image: postgres:15
    container_name: simplequiz-db
    restart: always
    environment:
      POSTGRES_DB: simplequiz
      POSTGRES_USER: simplequizuser
      POSTGRES_PASSWORD: simplequizpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simplequiz-backend
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=simplequiz.settings
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: simplequiz-frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  postgres_data:
